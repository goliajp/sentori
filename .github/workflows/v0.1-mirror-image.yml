name: mirror — build + push docker image (mirror-repo only)

# Only runs in sentori-selfhosted mirror repo. Detects by
# absence of saas/ dir. The monorepo's v0.1-images.yml
# handles both images side-by-side; the mirror only ships
# the self-hosted image (saas/ is stripped from mirror).

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: sentori-selfhosted image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if not mirror
        id: skip
        run: |
          if [[ -d saas ]]; then
            echo "skipping — this is the monorepo (use v0.1-images.yml)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
        if: steps.skip.outputs.skip != 'true'

      - uses: docker/login-action@v3
        if: steps.skip.outputs.skip != 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
            TAGS="${IMAGE}:${TAG},${IMAGE}:latest"
          else
            TAGS="${IMAGE}:edge,${IMAGE}:sha-${GITHUB_SHA::7}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        if: steps.skip.outputs.skip != 'true'
        with:
          context: .
          file: self-hosted/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0 OR MIT
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
