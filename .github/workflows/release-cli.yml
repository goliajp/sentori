name: release-cli

# Phase 17 sub-B: cross-platform prebuilt binaries for sentori-cli.
# Triggered by pushing a tag like `cli-v0.1.0`. Each matrix entry
# compiles cli/, strips the binary, archives it, and attaches it to a
# GitHub Release. The npm wrapper (@goliapkg/sentori-cli) downloads
# the right asset at install time based on process.platform + arch.

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)build, e.g. cli-v0.1.0'
        required: true

permissions:
  contents: write

# v2.1 — opt into Node.js 24 ahead of GitHub Actions' 2026-06-02
# forced cutover. See `build.yml` for the rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: linux-x64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Strip + archive
        run: |
          cd cli/target/${{ matrix.target }}/release
          strip sentori-cli || true
          tar -czf "sentori-cli-${{ steps.tag.outputs.ref }}-${{ matrix.artifact }}.tar.gz" sentori-cli
          shasum -a 256 "sentori-cli-${{ steps.tag.outputs.ref }}-${{ matrix.artifact }}.tar.gz" \
            > "sentori-cli-${{ steps.tag.outputs.ref }}-${{ matrix.artifact }}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact }}
          path: cli/target/${{ matrix.target }}/release/sentori-cli-*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --notes "Sentori CLI prebuilt binaries for $tag." \
              artifacts/*.tar.gz artifacts/*.tar.gz.sha256
          else
            gh release upload "$tag" --clobber \
              artifacts/*.tar.gz artifacts/*.tar.gz.sha256
          fi
