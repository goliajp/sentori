name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: sentori
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sentori"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:dev@localhost:5432/sentori
      VALKEY_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server -> target
            cli -> target

      - name: check rfc3339 serde annotations (phase 29 sub-C)
        run: bash scripts/check-rfc3339.sh

      - name: cargo test (server)
        run: cargo test --manifest-path server/Cargo.toml --all-targets

      - name: cargo check (cli)
        run: cargo check --manifest-path cli/Cargo.toml --all-targets

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: web — install + check + test + build
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run test
          bun run build

  sdk:
    # Phase 47.07 follow-up: previously this job only covered
    # sdk/react-native, so Vue / Svelte / Solid (added Phase 45) and
    # sentori-core / javascript / react / next regressions slipped
    # through. Matrix-run all 8 SDKs in parallel so any one of them
    # going red fails the build immediately.
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - sdk/core
          - sdk/javascript
          - sdk/react
          - sdk/next
          - sdk/react-native
          - sdk/vue
          - sdk/svelte
          - sdk/solid

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `bun install` at the root resolves the whole workspace, so
      # every per-package step below can skip re-installing.
      - name: install workspace
        run: bun install --frozen-lockfile

      - name: ${{ matrix.package }} — typecheck + test + build
        working-directory: ${{ matrix.package }}
        run: |
          bun run typecheck
          bun test
          bun run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [server-test, web, sdk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push sentori-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentori-server:latest
            ghcr.io/${{ github.repository_owner }}/sentori-server:${{ github.sha }}
          cache-from: type=gha,scope=sentori-server
          cache-to: type=gha,mode=max,scope=sentori-server

      - name: build & push sentori-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentori-web:latest
            ghcr.io/${{ github.repository_owner }}/sentori-web:${{ github.sha }}
          cache-from: type=gha,scope=sentori-web
          cache-to: type=gha,mode=max,scope=sentori-web
