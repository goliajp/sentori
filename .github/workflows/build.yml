name: build

# Phase 53 — surface-aware CI.
#
# Previously every push ran every job (server-test + 10-matrix sdk + web +
# docker-build), so a typo in web/ would still wait on 10 SDK builds,
# server tests, and a docker push. Worse, any flake in an unrelated job
# fired a failure email for a touch that should never have run it in the
# first place.
#
# Now: a single `changes` filter job detects which top-level surface a
# commit touched, and the heavy jobs are gated on it. Skipped jobs report
# as "skipped" (counted as a pass for `needs`), so downstream `docker-build`
# can still fire on main without the upstreams that didn't have to run.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    # Single source of truth for "what did this commit touch?". The
    # individual build jobs read these outputs to decide whether to run.
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      sdk: ${{ steps.filter.outputs.sdk }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `infra` covers the workflow files themselves + cross-cutting
          # repo config. Any change here re-runs everything so we don't
          # let a broken CI config slip in unnoticed.
          filters: |
            infra:
              - '.github/workflows/**'
              - 'package.json'
              - 'bun.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker/**'
              - 'scripts/**'
            server:
              - 'server/**'
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            web:
              - 'web/**'
            sdk:
              - 'sdk/**'

  server-test:
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: sentori
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sentori"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:dev@localhost:5432/sentori
      VALKEY_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server -> target
            cli -> target

      - name: check rfc3339 serde annotations (phase 29 sub-C)
        run: bash scripts/check-rfc3339.sh

      - name: cargo test (server)
        run: cargo test --manifest-path server/Cargo.toml --all-targets

      - name: cargo check (cli)
        run: cargo check --manifest-path cli/Cargo.toml --all-targets

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (matches local). `latest` on bun has been known to
          # change peerDependency resolution behaviour between patch
          # releases — pin to avoid CI drift from local development.
          bun-version: "1.3.13"

      - name: web — install + check + test + build
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run test
          bun run build

  sdk:
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.infra == 'true'
    # Matrix-run all SDKs in parallel so any one of them going red fails
    # the build immediately. `fail-fast: false` keeps a single SDK
    # regression from masking the rest.
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - sdk/core
          - sdk/javascript
          - sdk/react
          - sdk/next
          - sdk/react-native
          - sdk/vue
          - sdk/svelte
          - sdk/solid
          - sdk/expo
          - sdk/cli

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: install workspace
        run: bun install --frozen-lockfile

      # Build every SDK's lib/ first. Each matrix cell is isolated — without
      # this, packages that import a sibling SDK can't resolve the
      # workspace symlink to a `.d.ts`.
      - name: build all SDKs (resolve cross-package type refs)
        run: bun run build:sdks

      - name: ${{ matrix.package }} — typecheck + test + build
        working-directory: ${{ matrix.package }}
        run: |
          bun run typecheck
          bun test
          bun run build

  docker-build:
    # Wait for the upstreams that actually ran. Skipped jobs report
    # `result == skipped` which `!failure() && !cancelled()` accepts —
    # so when web is the only thing that changed, server-test and sdk
    # are skipped but this job still proceeds.
    needs: [changes, server-test, web, sdk]
    if: |
      always()
      && !failure()
      && !cancelled()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && (needs.changes.outputs.server == 'true'
          || needs.changes.outputs.web == 'true'
          || needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push sentori-server
        if: needs.changes.outputs.server == 'true' || needs.changes.outputs.infra == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentori-server:latest
            ghcr.io/${{ github.repository_owner }}/sentori-server:${{ github.sha }}
          cache-from: type=gha,scope=sentori-server
          cache-to: type=gha,mode=max,scope=sentori-server

      - name: build & push sentori-web
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.infra == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentori-web:latest
            ghcr.io/${{ github.repository_owner }}/sentori-web:${{ github.sha }}
          cache-from: type=gha,scope=sentori-web
          cache-to: type=gha,mode=max,scope=sentori-web
