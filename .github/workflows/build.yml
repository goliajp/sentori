name: build

# Phase 53 — surface-aware CI.
#
# Previously every push ran every job (server-test + 10-matrix sdk + web +
# docker-build), so a typo in web/ would still wait on 10 SDK builds,
# server tests, and a docker push. Worse, any flake in an unrelated job
# fired a failure email for a touch that should never have run it in the
# first place.
#
# Now: a single `changes` filter job detects which top-level surface a
# commit touched, and the heavy jobs are gated on it. Skipped jobs report
# as "skipped" (counted as a pass for `needs`), so downstream `docker-build`
# can still fire on master without the upstreams that didn't have to run.

on:
  push:
    branches: [master]
  pull_request:

# v2.1 — opt into Node.js 24 ahead of GitHub Actions' 2026-06-02
# forced cutover. Several pinned action versions in this file
# (actions/checkout@v4, dorny/paths-filter@v3, docker/login-action@v3,
# docker/setup-buildx-action@v3, docker/build-push-action@v5) are
# still on Node 20 internally. Setting this env var instructs the
# runner to lift them to Node 24 now, so we don't get caught by a
# forced migration on a deploy day. Once each action ships a Node-24-
# native major bump, drop this env var alongside the version bump.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    # Single source of truth for "what did this commit touch?". The
    # individual build jobs read these outputs to decide whether to run.
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      webapp: ${{ steps.filter.outputs.webapp }}
      sdk: ${{ steps.filter.outputs.sdk }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `infra` covers the workflow files themselves + cross-cutting
          # repo config. Any change here re-runs everything so we don't
          # let a broken CI config slip in unnoticed.
          filters: |
            infra:
              - '.github/workflows/**'
              - 'package.json'
              - 'bun.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker/**'
              - 'scripts/**'
            # Drives the `server-test` job, which after the v0.1
            # decommission runs the cli gates and the repo-wide checks
            # (rfc3339, orphan modules, cargo features) rather than
            # anything under server/.
            server:
              - 'cli/**'
              - 'core/**'
              - 'self-hosted/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            webapp:
              - 'webapp/**'
            sdk:
              - 'sdk/**'

  # A workflow file GitHub can't parse is accepted by `git push` and
  # then fails as a run with zero jobs and no readable log. Validate
  # them here so that failure mode can't reach master.
  workflows:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  server-test:
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: sentori
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sentori"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:dev@localhost:5432/sentori
      VALKEY_URL: redis://localhost:6379

    steps:
      # The legacy server workspace + its dep tree fills the
      # ubuntu-latest disk: 2026-07-20 the `cargo test (server)` step
      # died mid-run with "No space left on device" (the runner
      # couldn't even write its own diagnostic log). The preinstalled
      # Android SDK / .NET / GHC / CodeQL bundles are ~25 GB we never
      # touch.
      - name: free runner disk
        run: |
          df -h / | tail -1
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
                      /opt/ghc /usr/local/.ghcup \
                      /opt/hostedtoolcache/CodeQL
          df -h / | tail -1

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            server -> target
            cli -> target

      - name: check rfc3339 serde annotations (phase 29 sub-C)
        run: bash scripts/check-rfc3339.sh

      # A file no `mod` reaches is never compiled, so nothing else in
      # this job would notice it. That is how the rate limiter sat
      # written-but-dead while ingest ran unlimited.
      - name: check for orphan modules
        run: bash scripts/check-orphan-modules.sh

      - name: check cargo features (v2.20 P2 — anti-feature-drift)
        run: bash scripts/check-cargo-features.sh
      - name: cargo fmt (cli)
        run: cargo fmt --manifest-path cli/Cargo.toml --check

      - name: cargo clippy (cli)
        run: cargo clippy --manifest-path cli/Cargo.toml --all-targets -- -D warnings
  webapp:
    needs: changes
    if: needs.changes.outputs.webapp == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: webapp — install + check + build
        working-directory: webapp
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run build
  sdk:
    needs: changes
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.infra == 'true'
    # Matrix-run all SDKs in parallel so any one of them going red fails
    # the build immediately. `fail-fast: false` keeps a single SDK
    # regression from masking the rest.
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - sdk/core
          - sdk/javascript
          - sdk/react
          - sdk/next
          - sdk/react-native
          - sdk/vue
          - sdk/svelte
          - sdk/solid
          - sdk/expo
          - sdk/cli

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: install workspace
        run: bun install --frozen-lockfile

      # Build every SDK's lib/ first. Each matrix cell is isolated — without
      # this, packages that import a sibling SDK can't resolve the
      # workspace symlink to a `.d.ts`.
      - name: build all SDKs (resolve cross-package type refs)
        run: bun run build:sdks

      - name: ${{ matrix.package }} — typecheck + test + build
        working-directory: ${{ matrix.package }}
        run: |
          bun run typecheck
          bun test
          bun run build

  # `docker-build` lived here and pushed ghcr.io/goliajp/sentori-server
  # and ...-web from docker/Dockerfile.{server,web}. Both were the v0.1
  # build, decommissioned 2026-07-23. The v0.2 image is published by
  # `v0.2 self-hosted — docker image build + push to GHCR`, on master
  # and on release tags, under a different name
  # (goliajp/sentori/sentori-server), so nothing was sharing a tag.