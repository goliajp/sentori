name: deploy

# Phase 16 production deploy via the goliajp/devops infra.
# Mirrors the goliajp/portal pattern: lands on the self-hosted lx64
# runner, rsync the source into /apps/sentori/src, install services
# /sentori/docker-compose.yml from a fresh devops checkout, write
# .env from repo secrets, then `docker compose up -d`.
#
# Trigger surface (Phase 48 sub-H — every dashboard change must be
# visible on sentori.golia.jp/main without a manual branch push):
#
#   - push to master → deploy automatically AFTER the `build` workflow
#     completes green for the same SHA. We gate on the build run
#     because deploying a SHA that fails CI would leave prod in a
#     known-broken state.
#   - push to release/* → deploy directly (existing release-branch
#     dance for explicit-version deploys still works).
#   - workflow_dispatch → manual trigger from the Actions UI.

on:
  push:
    branches:
      - 'release/*'
  workflow_run:
    workflows: ['build']
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-lx64-sentori
  cancel-in-progress: false

# v2.1 — opt into Node.js 24 ahead of GitHub Actions' 2026-06-02
# forced cutover. See `build.yml` for the rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: [self-hosted, lx64]
    timeout-minutes: 45
    # Gate on the upstream `build` workflow when we got here via
    # `workflow_run`. Pushes to release/* and manual dispatches don't
    # have an upstream run and pass through unconditionally.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      REMOTE_DIR: /apps/sentori
      COMPOSE_FILE: /apps/sentori/docker-compose.yml

    steps:
      - uses: actions/checkout@v4
        with:
          # `workflow_run` defaults to checking out the *default* branch's
          # HEAD, not the SHA that triggered the upstream build. Pin to
          # the upstream SHA so we deploy exactly the commit that just
          # went green.
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Extract release version
        id: ver
        run: |
          # Branch-based releases (release/vX.Y.Z) carry the version in
          # the branch name. Master-line deploys (workflow_run trigger)
          # don't — we derive a short SHA so we still tag the prod box
          # with something machine-readable.
          branch="${GITHUB_REF_NAME:-master}"
          if [[ "$branch" == release/* ]]; then
            version="${branch#release/}"
            version="${version#v}"
          else
            version="$(git rev-parse --short=7 HEAD)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "==> deploying version $version"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build marketing (Astro static)
        working-directory: marketing
        env:
          PUBLIC_SENTORI_TOKEN: ${{ secrets.SENTORI_DOGFOOD_MARKETING_TOKEN }}
          PUBLIC_GIT_SHA: ${{ github.sha }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build docs-site (Astro Starlight)
        working-directory: docs-site
        env:
          PUBLIC_SENTORI_TOKEN: ${{ secrets.SENTORI_DOGFOOD_DOCS_TOKEN }}
          PUBLIC_GIT_SHA: ${{ github.sha }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Rsync marketing/dist → /apps/sentori/marketing-dist
        run: |
          install -d -m 0755 "${REMOTE_DIR}/marketing-dist"
          rsync -a --delete marketing/dist/ "${REMOTE_DIR}/marketing-dist/"

      - name: Rsync docs-site/dist → /apps/sentori/docs-dist
        run: |
          install -d -m 0755 "${REMOTE_DIR}/docs-dist"
          rsync -a --delete docs-site/dist/ "${REMOTE_DIR}/docs-dist/"

      - name: Rsync source into /apps/sentori/src
        run: |
          mkdir -p "${REMOTE_DIR}/src"
          rsync -a --delete \
            --exclude .git \
            --exclude server/target \
            --exclude cli/target \
            --exclude web/node_modules \
            --exclude web/dist \
            --exclude marketing/node_modules \
            --exclude marketing/dist \
            --exclude docs-site/node_modules \
            --exclude docs-site/dist \
            --exclude sdk/react-native/node_modules \
            ./ "${REMOTE_DIR}/src/"

      - name: Install compose file from devops/services/sentori
        run: |
          DEVOPS_DIR="$HOME/workspace/goliajp/devops"
          if [ -d "$DEVOPS_DIR/.git" ]; then
            git -C "$DEVOPS_DIR" pull --ff-only origin develop \
              || echo "warning: devops pull failed; using existing checkout"
            SRC_COMPOSE="$DEVOPS_DIR/services/sentori/docker-compose.yml"
          else
            SRC_COMPOSE="${REMOTE_DIR}/src/devops/services/sentori/docker-compose.yml"
          fi
          install -m 0644 "$SRC_COMPOSE" "${COMPOSE_FILE}"

      - name: Write .env
        env:
          SENTORI_PG_PASSWORD: ${{ secrets.SENTORI_PG_PASSWORD }}
          SENTORI_DEV_TOKEN: ${{ secrets.SENTORI_DEV_TOKEN }}
          SENTORI_ADMIN_PASSWORD: ${{ secrets.SENTORI_ADMIN_PASSWORD }}
          SENTORI_SESSION_SECRET: ${{ secrets.SENTORI_SESSION_SECRET }}
          SENTORI_SMTP_HOST: ${{ secrets.SENTORI_SMTP_HOST }}
          SENTORI_SMTP_PORT: ${{ secrets.SENTORI_SMTP_PORT }}
          SENTORI_SMTP_USER: ${{ secrets.SENTORI_SMTP_USER }}
          SENTORI_SMTP_PASS: ${{ secrets.SENTORI_SMTP_PASS }}
          SENTORI_SMTP_FROM: ${{ secrets.SENTORI_SMTP_FROM }}
          SENTORI_SMTP_TLS: ${{ secrets.SENTORI_SMTP_TLS }}
          SENTORI_DOGFOOD_DASHBOARD_TOKEN: ${{ secrets.SENTORI_DOGFOOD_DASHBOARD_TOKEN }}
          # v1.0 — OAuth provider credentials. Registered manually at
          # github.com/settings/developers + console.cloud.google.com,
          # then pasted into the corresponding repo secret. Empty when
          # the operator hasn't registered yet; the server gracefully
          # hides the "Continue with …" buttons in that case.
          SENTORI_GITHUB_CLIENT_ID: ${{ secrets.SENTORI_GITHUB_CLIENT_ID }}
          SENTORI_GITHUB_CLIENT_SECRET: ${{ secrets.SENTORI_GITHUB_CLIENT_SECRET }}
          SENTORI_GOOGLE_CLIENT_ID: ${{ secrets.SENTORI_GOOGLE_CLIENT_ID }}
          SENTORI_GOOGLE_CLIENT_SECRET: ${{ secrets.SENTORI_GOOGLE_CLIENT_SECRET }}
          # v0.2 stack — saasadmin UUIDs are filled in post-ETL (IDs
          # copy 1:1 from legacy users); stripe secret optional until
          # billing goes live on the new stack.
          SENTORI_SAASADMIN_USER_IDS: ${{ secrets.SENTORI_SAASADMIN_USER_IDS }}
          SENTORI_STRIPE_WEBHOOK_SECRET: ${{ secrets.SENTORI_STRIPE_WEBHOOK_SECRET }}
          # First `super` operator for sentori-saas-control. Seeding is
          # idempotent, so redeploying can't reset the password.
          SENTORI_SAASADMIN_BOOTSTRAP_EMAIL: ${{ secrets.SENTORI_SAASADMIN_BOOTSTRAP_EMAIL }}
          SENTORI_SAASADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.SENTORI_SAASADMIN_BOOTSTRAP_PASSWORD }}
          SENTORI_SAASADMIN_BOOTSTRAP_NAME: ${{ secrets.SENTORI_SAASADMIN_BOOTSTRAP_NAME }}
          # Use the upstream SHA when we came via workflow_run (matches
          # the checked-out ref). github.sha is the default-branch HEAD
          # at trigger time, which can drift; prefer head_sha when set.
          SENTORI_VERSION: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          umask 077
          cat > "${REMOTE_DIR}/.env" <<EOF
          SENTORI_PG_PASSWORD=${SENTORI_PG_PASSWORD}
          SENTORI_DEV_TOKEN=${SENTORI_DEV_TOKEN}
          SENTORI_ADMIN_PASSWORD=${SENTORI_ADMIN_PASSWORD}
          SENTORI_SESSION_SECRET=${SENTORI_SESSION_SECRET}
          SENTORI_SMTP_HOST=${SENTORI_SMTP_HOST}
          SENTORI_SMTP_PORT=${SENTORI_SMTP_PORT:-587}
          SENTORI_SMTP_USER=${SENTORI_SMTP_USER}
          SENTORI_SMTP_PASS=${SENTORI_SMTP_PASS}
          SENTORI_SMTP_FROM=${SENTORI_SMTP_FROM:-sentori@golia.jp}
          SENTORI_SMTP_TLS=${SENTORI_SMTP_TLS:-starttls}
          # Phase 17 sub-F dogfood — read by docker-compose web build args
          SENTORI_DOGFOOD_DASHBOARD_TOKEN=${SENTORI_DOGFOOD_DASHBOARD_TOKEN}
          SENTORI_GITHUB_CLIENT_ID=${SENTORI_GITHUB_CLIENT_ID}
          SENTORI_GITHUB_CLIENT_SECRET=${SENTORI_GITHUB_CLIENT_SECRET}
          SENTORI_GOOGLE_CLIENT_ID=${SENTORI_GOOGLE_CLIENT_ID}
          SENTORI_GOOGLE_CLIENT_SECRET=${SENTORI_GOOGLE_CLIENT_SECRET}
          SENTORI_VERSION=${SENTORI_VERSION}
          SENTORI_SAASADMIN_USER_IDS=${SENTORI_SAASADMIN_USER_IDS}
          SENTORI_STRIPE_WEBHOOK_SECRET=${SENTORI_STRIPE_WEBHOOK_SECRET}
          SENTORI_SAASADMIN_BOOTSTRAP_EMAIL=${SENTORI_SAASADMIN_BOOTSTRAP_EMAIL}
          SENTORI_SAASADMIN_BOOTSTRAP_PASSWORD=${SENTORI_SAASADMIN_BOOTSTRAP_PASSWORD}
          SENTORI_SAASADMIN_BOOTSTRAP_NAME=${SENTORI_SAASADMIN_BOOTSTRAP_NAME}
          RUST_LOG=info,sentori_server=info
          EOF
          chmod 600 "${REMOTE_DIR}/.env"

      - name: Build & up
        working-directory: /apps/sentori
        run: |
          docker compose --env-file .env -f docker-compose.yml build \
            server web server-v2 saas-control
          docker compose --env-file .env -f docker-compose.yml up -d \
            postgres valkey server web marketing docs \
            postgres-v2 server-v2 saas-control

      - name: Wait for /v1/events/_recent
        env:
          SENTORI_DEV_TOKEN: ${{ secrets.SENTORI_DEV_TOKEN }}
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS -H "Authorization: Bearer $SENTORI_DEV_TOKEN" \
               http://127.0.0.1:18080/v1/events/_recent >/dev/null; then
              echo "==> healthy"
              exit 0
            fi
            sleep 2
          done
          echo "==> health check failed — recent logs:"
          docker compose -f "${COMPOSE_FILE}" logs --tail 100 server || true
          exit 1

      - name: Smoke test — public surface
        env:
          SENTORI_DEV_TOKEN: ${{ secrets.SENTORI_DEV_TOKEN }}
        run: |
          set -e
          fail() { echo "smoke FAIL: $1" >&2; exit 1; }
          # /v1/events/_recent: dev token authenticates and the endpoint
          # returns a JSON array. We don't assert the array is empty —
          # real dogfood traffic (Insight) keeps live events in there,
          # so the original `= "[]"` check was a stale assumption.
          recent=$(curl -fsS -H "Authorization: Bearer $SENTORI_DEV_TOKEN" \
            http://127.0.0.1:18080/v1/events/_recent)
          [ "${recent:0:1}" = "[" ] || fail "_recent expected JSON array, got $recent"
          # /metrics: prometheus exporter live
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/metrics)
          test "$status" = "200" || fail "/metrics expected 200, got $status"
          # /api/auth/me without cookie -> 401 (auth gate engaged)
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/auth/me)
          test "$status" = "401" || fail "/api/auth/me expected 401, got $status"
          # web container responds
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18800/)
          test "$status" = "200" || fail "web :18800 expected 200, got $status"
          # marketing static
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18801/)
          test "$status" = "200" || fail "marketing :18801 expected 200, got $status"
          # docs static
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18802/)
          test "$status" = "200" || fail "docs :18802 expected 200, got $status"
          echo "==> smoke OK"

      - name: Wait + smoke — v0.2 stack
        run: |
          set -e
          fail() { echo "v0.2 smoke FAIL: $1" >&2; exit 1; }
          # server-v2 runs migrations at boot; give it the same 120s
          # budget the legacy server gets.
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:18090/healthz >/dev/null; then
              break
            fi
            if [ "$i" = "60" ]; then
              echo "==> server-v2 health check failed — recent logs:"
              docker compose -f "${COMPOSE_FILE}" logs --tail 100 server-v2 || true
              fail "server-v2 /healthz never came up"
            fi
            sleep 2
          done
          # readiness (DB reachable)
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18090/readyz)
          test "$status" = "200" || fail "/readyz expected 200, got $status"
          # session gate engaged (no cookie -> 401)
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18090/auth/me)
          test "$status" = "401" || fail "/auth/me expected 401, got $status"
          # SPA fallback serves the dashboard shell
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18090/login)
          test "$status" = "200" || fail "SPA /login expected 200, got $status"
          # saas-control is listening
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18091/healthz)
          case "$status" in 200|404) : ;; *) fail "saas-control :18091 unreachable (got $status)";; esac
          echo "==> v0.2 smoke OK"

      - name: Tag release version
        # Only on the release/* push path — master-line deploys derived
        # version from the short SHA, which we don't want to tag.
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          git tag "v${{ steps.ver.outputs.version }}" || true
          git push origin "v${{ steps.ver.outputs.version }}" || true
