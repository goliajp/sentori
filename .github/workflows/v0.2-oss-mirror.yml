name: v0.2 OSS — mirror to sentori-selfhosted public repo

# Syncs self-hosted + core + sdk + docker assets to the public
# sentori-selfhosted repo (goliajp/sentori-selfhosted) so the
# community can fork / inspect / contribute. The public repo's
# own CI (v0.2-self-hosted-image.yml, also synced) builds the
# docker image users pull.
#
# Required secrets:
#   SENTORI_SELFHOSTED_MIRROR_REPO   — e.g. goliajp/sentori-selfhosted
#   SENTORI_SELFHOSTED_MIRROR_TOKEN  — PAT with repo write access
#
# Triggers:
#   - master push (continuous mirror)
#   - release tag v<x>.<y>.<z> (release-aligned mirror)
#   - manual dispatch

on:
  push:
    branches: [master]
    # Releases are tagged v<major>.<minor>.<patch>. The old 'v0.2.*'
    # filter matched no real tag, so the "mirror the tag too" branch
    # below had never once run and the public repo never received a
    # version tag from CI.
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ vars.SENTORI_SELFHOSTED_MIRROR_REPO != '' }}
    steps:
      - name: Checkout sentori (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter to self-hosted-only tree
        run: |
          mkdir -p /tmp/mirror
          # Minimal public set: server binary source + core libs +
          # docker + bundled SPA source + licenses + the README.
          # Everything else (docs, contributing templates, internal
          # planning, saas-control, marketing, sdk pkg matrix) stays
          # private — the public mirror is consumption-only.
          #
          # Every directory exclusion is anchored with a leading `/`.
          # rsync matches an unanchored `server/` at any depth, so the
          # rule meant to drop the v0.1 crate was also dropping
          # `self-hosted/server/` — the v0.2 server source, in the
          # repository whose entire purpose is letting people run it.
          # `target/` and `node_modules/` stay unanchored on purpose:
          # those should go at every depth.
          #
          # Every workflow is private by default. The mirror does not
          # need to ship CI configs — a user building their own image
          # writes their own. Excluding by name meant new workflows
          # opted in by accident: `prod-drift.yml` was published on the
          # first successful push and rejected because the PAT lacked
          # `workflow` scope. If we ever want to publish a workflow,
          # whitelist it explicitly with `--include` before the wildcard
          # exclude — today, none.
          #
          # `/.git/` is the private repo's checkout, not source. Without
          # this exclude, rsync copies the private git dir into
          # /tmp/mirror. `git init` becomes a no-op, `git remote add
          # origin` fails with "already exists", and — before that
          # error — a mirror that succeeded would have been publishing
          # every private commit and branch ever made. Anchored so it
          # matches only the top level, not `.git` inside submodules or
          # checked-in fixtures.
          #
          # `docker/` is excluded because it is the v0.1 build.
          # Dockerfile.server COPYs `server/`, which this mirror does
          # not ship, and production-compose.yml pulls
          # ghcr.io/goliajp/sentori-server, which stopped being built
          # when v0.1 was decommissioned on 2026-07-23. A reader
          # following it hit a 404 on the first COPY. The v0.2
          # equivalents are in `self-hosted/docker/` and are mirrored.
          rsync -a --delete \
            --exclude='/saas/' \
            --exclude='/server/' \
            --exclude='/web/' \
            --exclude='/docker/' \
            --exclude='/marketing/' \
            --exclude='/docs/' \
            --exclude='/docs-site/' \
            --exclude='/docs-v0.1/' \
            --exclude='/docs-v0.2/' \
            --exclude='ROADMAP.md' \
            --exclude='ROADMAP-PHASE-50.md' \
            --exclude='ops/secrets.md' \
            --exclude='CHANGELOG.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='CODE_OF_CONDUCT.md' \
            --exclude='SECURITY.md' \
            --exclude='.github/ISSUE_TEMPLATE/' \
            --exclude='.github/PULL_REQUEST_TEMPLATE.md' \
            --exclude='.github/CONTRIBUTING.md' \
            --exclude='.github/SECURITY.md' \
            --exclude='target/' \
            --exclude='node_modules/' \
            --exclude='.github/workflows/**' \
            --exclude='.claude/' \
            --exclude='/.git/' \
            ./ /tmp/mirror/
          find /tmp/mirror/ -maxdepth 1 -printf '%f\n' | sort | head -20

      - name: Push to sentori-selfhosted public repo
        env:
          MIRROR_REPO: ${{ vars.SENTORI_SELFHOSTED_MIRROR_REPO }}
          MIRROR_TOKEN: ${{ secrets.SENTORI_SELFHOSTED_MIRROR_TOKEN }}
        run: |
          # Fail rather than skip. This exited 0 without a token, so
          # every run reported success while pushing nothing, and the
          # public repository — the artifact self-hosted users actually
          # consume — sat three days and thirty commits behind without
          # anything going red. A mirror that cannot mirror is broken,
          # not fine.
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "::error::SENTORI_SELFHOSTED_MIRROR_TOKEN is not set."
            echo "::error::The public mirror has not been updated since"
            echo "::error::this token went missing. Set it, or disable"
            echo "::error::this workflow — but do not leave it green and"
            echo "::error::silent."
            exit 1
          fi
          cd /tmp/mirror
          git init -b master
          git config user.email "ci@golia.jp"
          git config user.name "sentori-mirror-bot"
          git add -A
          git commit -m "mirror: ${{ github.sha }} from goliajp/sentori@${{ github.ref_name }}"
          git remote add origin "https://x-access-token:${MIRROR_TOKEN}@github.com/${MIRROR_REPO}.git"
          git push -f origin master
          # Mirror tag too if this run is for a tag.
          # shellcheck disable=SC2193  # actionlint substitutes the
          # expression with a fixed placeholder before shellcheck sees
          # it, so the glob looks unreachable; at runtime github.ref
          # really can be refs/tags/<tag>.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            git tag "${{ github.ref_name }}"
            git push origin "${{ github.ref_name }}"
          fi
