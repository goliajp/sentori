name: mobile-e2e

# Native + symbolication checks that need more than the Linux unit-test
# runner.
#
# 2026-07-22 rewrite. The previous version had four jobs and all four
# were pointing at things that do not exist:
#
#   · ios-xctest         `-scheme SentoriTests`, but `sdk/react-native/ios`
#                        holds loose .swift files and no Xcode project.
#   · android-robolectric `./gradlew` in a directory with no wrapper, on a
#                        module that depends on `:expo-modules-core` and
#                        cannot build standalone.
#   · mailcatcher        legacy `server/` + `server/migrations`.
#   · sourcemap-e2e      same legacy server.
#
# It had been switched to `workflow_dispatch` in v0.4 with a note to
# restore the triggers "once those two are fixed", and then sat failing
# and unlooked-at from 2026-05-11. A gate nobody can run is not a gate;
# a red one nobody looks at is worse, because the red stops meaning
# anything.
#
# What is left runs, and runs on the code that ships.

on:
  push:
    branches: [develop, master]
    paths:
      - 'sdk/react-native/android/**'
      - 'apps/rn-example/**'
      - '.github/workflows/mobile-e2e.yml'
  pull_request:
    branches: [develop, master]
    paths:
      - 'sdk/react-native/android/**'
      - 'apps/rn-example/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # The SDK's Android module has two Robolectric tests and has never
  # been able to run them: it is an Expo module, so it only builds
  # inside a host app's Gradle project. `apps/rn-example` is that host,
  # and expo-autolinking pulls the SDK in — the same path used to verify
  # on a real device.
  #
  # This closes the hole recorded in the project notes: changing a .kt
  # file passed every gate and shipped to npm unchecked, which is how
  # the v3.0.0 K2 bug got out.
  android-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: install example app deps
        working-directory: apps/rn-example
        run: bun install --frozen-lockfile

      # `apps/rn-example/android` is a prebuild output and is
      # gitignored, so the runner has to generate it. Locally it is
      # already there, which is exactly why the first version of this
      # job passed review and then failed on a clean checkout.
      - name: expo prebuild (generates the host Gradle project)
        working-directory: apps/rn-example
        run: bunx expo prebuild --platform android --no-install

      # The module's Gradle path is decided by expo-autolinking at
      # configure time, so it is discovered rather than hardcoded — a
      # guessed name would silently pass by testing nothing.
      - name: Robolectric (SDK module, via host project)
        working-directory: apps/rn-example/android
        run: |
          MODULE=$(./gradlew projects --console=plain -q \
            | grep -oE "Project ':[a-z0-9-]*sentori[a-z0-9-]*'" \
            | head -1 | sed "s/Project '//;s/'//")
          if [ -z "$MODULE" ]; then
            echo "::error::the Sentori module is not in the host Gradle project;"
            echo "::error::expo-autolinking did not pick it up, so its tests cannot run"
            ./gradlew projects --console=plain -q | head -40
            exit 1
          fi
          echo "testing $MODULE"
          ./gradlew "$MODULE:testDebugUnitTest" --console=plain

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-reports
          # The module builds under node_modules, not under the host
          # project — the first version pointed at the host and uploaded
          # nothing, so a failing run had no report to read.
          path: |
            **/sentori-react-native/build/reports/tests/
            **/sentori-react-native/build/test-results/
          if-no-files-found: warn

  # Round-trip symbolication against the v0.2 server: bundle a fixture,
  # upload its map, send a stack from the minified bundle, assert the
  # frames come back pointing at the original source.
  #
  # The unit tests in `self-hosted/server/src/symbolicate.rs` pin the
  # resolver's arithmetic against a hand-built map. This pins the part
  # they cannot: that a real Metro map, uploaded over HTTP, matched to a
  # release by name, produces the right answer.
  sourcemap-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: sentori
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: self-hosted/server
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: build + start server
        env:
          SENTORI_DATABASE_URL: postgres://postgres:dev@localhost:5432/sentori
          SENTORI_SESSION_SECRET: ci-secret-deadbeefdeadbeefdeadbeefdeadbeef
          SENTORI_BOOTSTRAP_OWNER_EMAIL: ci@example.com
          SENTORI_BOOTSTRAP_OWNER_PASSWORD: ci-password-long-enough
          SENTORI_BASE_URL: http://localhost:8080
          # `fs:` rather than the default in-memory store: the
          # symbolicator reads the map back out, and an in-memory blob
          # store would work here by accident while hiding a real path.
          SENTORI_ATTACHMENT_STORE: fs:/tmp/sentori-blobs
        working-directory: self-hosted/server
        run: |
          mkdir -p /tmp/sentori-blobs
          cargo build
          # Migrations run at boot, so starting the binary is the whole
          # setup step.
          ./target/debug/sentori-server &
          for _ in $(seq 1 60); do
            curl -sf http://localhost:8080/healthz && break
            sleep 1
          done
          curl -sf http://localhost:8080/healthz

      - name: symbolication round trip
        env:
          SENTORI_BASE: http://localhost:8080
          SENTORI_OWNER_EMAIL: ci@example.com
          SENTORI_OWNER_PASSWORD: ci-password-long-enough
        run: bash scripts/sourcemap-e2e/run-v02.sh
