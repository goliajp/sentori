name: v0.2 core — fmt + clippy + check

on:
  push:
    branches: [feature/v0.2-**, develop, master]
    paths:
      - 'core/**'
      - 'self-hosted/server/**'
      - '.github/workflows/v0.2-core-check.yml'
  pull_request:
    branches: [develop, master]
    paths:
      - 'core/**'
      - 'self-hosted/server/**'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: check
        run: cargo check --workspace --all-targets
      # The core crates' integration tests spin up their own Postgres
      # via testcontainers, so they need nothing but a docker daemon —
      # which the runner has. They were never run in CI: this job did
      # clippy and check only, so every assertion in
      # crates/*/tests/integration.rs was dead weight.
      - name: test
        run: cargo test --workspace --all-targets

  # The v0.2 server crate had no CI at all: build.yml tests the legacy
  # `server/` and this workflow tested `core/`, so nothing ever
  # compiled or ran the tests for the binary that actually ships in
  # the self-hosted image.
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: self-hosted/server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: self-hosted/server
      - name: fmt
        run: cargo fmt --all -- --check
      # Not `-D warnings` yet: this crate carries ~110 pre-existing
      # lints from never having been linted, and clearing them means
      # touching ~64 files of a binary that is currently serving
      # production. Surfaced here so the count can only go down;
      # promoting to -D warnings is its own change.
      - name: clippy (report-only)
        run: cargo clippy --all-targets
      - name: test
        run: cargo test --all-targets
