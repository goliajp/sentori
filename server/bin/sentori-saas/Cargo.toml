[package]
# Phase A.1 Stage B — sentori-saas binary.
# v0.1 SaaS edition (per .claude/state/product-architecture.html D3, D9).
# multi-tenant + saasadmin + Stripe + license JWT enforcement。
# Stage B-1 仅 skeleton, main.rs 暂跟 selfhosted 同 (开同款 server),
# tenant scoping middleware + saas crate integration 后续 stage 加。
name = "sentori-saas"
version = "1.3.0"
edition = "2024"
authors = ["GOLIA K.K. <takagi@golia.jp>"]
description = "Sentori SaaS server — proprietary, GOLIA internal"
license = "Proprietary"
publish = false

[[bin]]
name = "sentori-saas"
path = "src/main.rs"

[dependencies]
sentori-core = { path = "../../crates/core" }
sentori-saas-lib = { path = "../../crates/saas" }   # Stage B-2 加入 — 现仅 skeleton, B-3 真用

# Bin wrapper 依赖
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = { version = "0.8", features = ["multipart"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "time"] }
redis = { version = "1", features = ["tokio-comp", "connection-manager"] }
uuid = { version = "1", features = ["v7", "serde"] }
