[package]
# Phase A.1 Stage B — sentori-selfhosted binary.
# v0.1 OSS edition (per .claude/state/product-architecture.html D2, D9).
# 单 workspace 形态, 不含 multi-tenant 抽象, license middleware 不 enable
# (per OSS Community tier 永久 unlock)。
name = "sentori-selfhosted"
version = "1.3.0"
edition = "2024"
authors = ["GOLIA K.K. <takagi@golia.jp>"]
description = "Sentori self-hosted (OSS) server — Apache 2.0 OR MIT"
license = "Apache-2.0 OR MIT"
publish = false

[[bin]]
name = "sentori-selfhosted"
path = "src/main.rs"

[dependencies]
sentori-core = { path = "../../crates/core" }

# Bin wrapper 依赖 — 跟现 main.rs 用到的 third-party 一致
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = { version = "0.8", features = ["multipart"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "uuid", "time"] }
redis = { version = "1", features = ["tokio-comp", "connection-manager"] }
uuid = { version = "1", features = ["v7", "serde"] }
