# Sentori self-hosted Helm values.
#
# `helm install sentori sentori-selfhosted` ships a working
# single-workspace deployment with embedded postgres. For
# production you typically:
#   - set `postgres.enabled: false`
#   - set `externalDatabase.url: postgres://...`
#   - set `ingress.host: sentori.yourdomain.com`

# ── image ──────────────────────────────────────────────────
image:
  repository: ghcr.io/goliajp/sentori-selfhosted
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# ── server (the axum binary) ───────────────────────────────
server:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
  # First-boot bootstrap. Leave both empty to skip + sign
  # up via the dashboard.
  bootstrap:
    ownerEmail: ""
    ownerPassword: ""
  env:
    RUST_LOG: "info,sqlx=warn"

# ── embedded postgres (good for kicking the tires) ─────────
postgres:
  enabled: true
  image: postgres:18-alpine
  storage: 10Gi
  user: sentori
  password: changeme
  database: sentori

# ── external DB (for production) ───────────────────────────
externalDatabase:
  url: ""   # set this when postgres.enabled = false

# ── ingress (off by default) ───────────────────────────────
ingress:
  enabled: false
  className: ""
  host: sentori.example.com
  tls:
    enabled: false
    secretName: sentori-tls
  annotations: {}

# ── serviceAccount ─────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
