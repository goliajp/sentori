apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-server
  labels:
    {{- include "sentori.labels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: 8080
      name: http
  selector:
    {{- include "sentori.selectorLabels" . | nindent 4 }}
    component: server
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-server
  labels:
    {{- include "sentori.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.server.bootstrap.ownerEmail }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-bootstrap
  labels:
    {{- include "sentori.labels" . | nindent 4 }}
type: Opaque
stringData:
  ownerPassword: {{ .Values.server.bootstrap.ownerPassword | quote }}
{{- end }}
