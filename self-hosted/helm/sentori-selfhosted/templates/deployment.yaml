apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-server
  labels:
    {{- include "sentori.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentori.selectorLabels" . | nindent 6 }}
      component: server
  template:
    metadata:
      labels:
        {{- include "sentori.selectorLabels" . | nindent 8 }}
        component: server
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Release.Name }}-server
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SENTORI_BIND
              value: "0.0.0.0:8080"
            - name: SENTORI_DATABASE_URL
              value: {{ include "sentori.dbUrl" . | quote }}
            {{- if .Values.server.bootstrap.ownerEmail }}
            - name: SENTORI_BOOTSTRAP_OWNER_EMAIL
              value: {{ .Values.server.bootstrap.ownerEmail | quote }}
            - name: SENTORI_BOOTSTRAP_OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-bootstrap
                  key: ownerPassword
            {{- end }}
            {{- range $k, $v := .Values.server.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
